services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sr_user
      POSTGRES_PASSWORD: sr_password
      POSTGRES_DB: sr_pipeline
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sr_user -d sr_pipeline"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://sr_user:sr_password@db:5432/sr_pipeline
      BIND_ADDR: 0.0.0.0:8080
      UPLOAD_DIR: /data/uploads
      OUTPUT_DIR: /data/outputs
      FRONTEND_DIR: /app/frontend
    ports:
      - "8080:8080"
    volumes:
      - shared_images:/data
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8080
    working_dir: /app
    volumes:
      - shared_images:/data
    depends_on:
      - backend

volumes:
  pgdata:
  shared_images:
